spring:
  application:
    name: quill
  threads:
    virtual:
      enabled: true
  mvc:
    problemdetails:
      enabled: true
  cache:
    type: redis
    redis:
      time-to-live: 1h
      key-prefix: "quill:"
  datasource:
    url: jdbc:postgresql://localhost:5432/quill
    username: quill
    password: secret
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 1025

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

app:
  base-url: http://localhost:5173
  openapi:
    server-url: http://localhost:8080
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    # Generate a key locally: openssl rand -base64 32
    secret: ${JWT_SECRET}
    expiration: 24h
  rate-limit:
    enabled: true
    defaults:
      capacity: 100
      refill: 100
      refill-unit: minutes
    endpoints:
      - pattern: /api/auth/**
        cache-key: ip
        bandwidths:
          - capacity: 5
            refill: 5
            refill-unit: minutes
      - pattern: /api/**
        cache-key: username
        bandwidths:
          - capacity: 100
            refill: 100
            refill-unit: minutes
          - capacity: 10
            refill: 10
            refill-unit: seconds
            refill-speed: greedy
