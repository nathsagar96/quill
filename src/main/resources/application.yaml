spring:
  application:
    name: quill
  mvc:
    problemdetails:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  mail:
    host: localhost
    port: 1025

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers,env,threaddump,heapdump,mappings
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

quill:
  app:
    base-url: http://localhost:5173
  jwt:
    secret: Y5JIUo3DKKtevtV4LKYcLiLQwU8AkEXNrTMkWuLdZ+g=
    expiration: 24h
