services:
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=quill
      - POSTGRES_USER=quill
      - POSTGRES_PASSWORD=secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U quill -d quill' ]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pgdata:
