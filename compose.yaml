services:
  postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=quill
      - POSTGRES_USER=quill
      - POSTGRES_PASSWORD=secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U quill -d quill' ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.30
    ports:
      - '1025:1025'
      - '8025:8025'
    healthcheck:
      test: ['CMD', '/mailpit', 'readyz']
      interval: 15s
      start_period: 10s
      retries: 3

volumes:
  pgdata:
